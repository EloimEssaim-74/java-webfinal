server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:kb-platform}
        # Stage 14: 心跳调优 — 高负载下避免误判不健康
        heart-beat-interval: 3000
        heart-beat-timeout: 30000
        ip-delete-timeout: 45000
        enabled: true
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:kb-platform}
        file-extension: yml
        enabled: false

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        # Interact Service — 必须放在 article-service 之前（/api/articles/*/like 优先匹配）
        - id: interact-service
          uri: lb://interact-service
          predicates:
            - Path=/api/comments,/api/comments/**,/api/articles/*/like
        # Article Service
        - id: article-service
          uri: lb://article-service
          predicates:
            - Path=/api/articles/**,/api/trending
        # AI Assistant Service (SSE 流式 — 长超时)
        - id: ai-assistant-service
          uri: lb://ai-assistant-service
          predicates:
            - Path=/api/ai/**
          metadata:
            connect-timeout: 5000
            response-timeout: 300000

    sentinel:
      # Load rules eagerly at startup (no first-request delay)
      eager: true
      # Sentinel Dashboard (optional, for visual monitoring; must differ from gateway port 8080)
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:18080}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.kb.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

# ============================================
# SpringDoc OpenAPI Gateway 聚合
# ============================================
springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /api/user/v3/api-docs
      - name: article-service
        url: /api/articles/v3/api-docs
      - name: interact-service
        url: /api/comments/v3/api-docs
  api-docs:
    enabled: true
