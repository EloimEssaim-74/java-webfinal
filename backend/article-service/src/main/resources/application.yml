server:
  port: ${SERVER_PORT:9002}

spring:
  application:
    name: article-service
  datasource:
    # 读写分离开关（Stage 9 — 生产环境启用）
    read-write-splitting:
      enabled: ${DB_READ_WRITE_SPLITTING:false}
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/kb_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    # 从库数据源（读写分离启用时使用）
    slave:
      url: jdbc:mysql://${DB_SLAVE_HOST:localhost}:${DB_SLAVE_PORT:3306}/kb_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:root123}
      driver-class-name: com.mysql.cj.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 3000
      # 连接有效性检测
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      # 连接泄漏检测
      remove-abandoned: false
      remove-abandoned-timeout: 1800
      log-abandoned: true
      # 过滤器
      filters: stat,wall
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          enabled: true
          config:
            multi-statement-allow: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:kb-platform}
        # Stage 14: 心跳调优 — 高负载下避免误判不健康
        heart-beat-interval: 3000
        heart-beat-timeout: 30000
        ip-delete-timeout: 45000
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:kb-platform}
        file-extension: yml
        enabled: false

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

# 热搜榜单配置
hot-articles:
  cache-ttl-seconds: 1         # Caffeine 本地缓存 TTL（秒）
  decay-cron: "0 0 3 * * ?"    # 每日凌晨3点执行热度衰减
  decay-factor: 0.9            # 衰减因子：每日分数乘以 0.9
  decay-min-score: 1.0         # 分数低于此阈值自动移除

logging:
  level:
    com.kb.article: DEBUG
