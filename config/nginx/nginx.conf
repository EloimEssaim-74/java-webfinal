worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ============================================
    # 日志格式（含上游响应时间）
    # ============================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ============================================
    # 基础性能优化
    # ============================================
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout   65;
    client_max_body_size 10m;

    # ============================================
    # Gzip 压缩（降低带宽消耗 ~70%）
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        text/xml
        image/svg+xml;

    # ============================================
    # HTTP 缓存配置
    # ============================================
    # 热搜榜缓存：1 秒 TTL，多实例共享内存
    proxy_cache_path /tmp/nginx_cache_trending
        levels=1:2
        keys_zone=trending_cache:10m
        max_size=50m
        inactive=5m
        use_temp_path=off;

    # ============================================
    # 限流配置（令牌桶，单 IP 维度）
    # ============================================
    # 通用限流：100 req/s per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
    # 写接口限流：20 req/s per IP
    limit_req_zone $binary_remote_addr zone=write_limit:10m rate=20r/s;
    # 连接数限制：单 IP 最多 50 并发连接
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================
    # 上游网关集群（2 实例负载均衡）
    # ============================================
    # 一致性哈希（least_conn）：将请求分发给连接数最少的实例
    upstream gateway_cluster {
        least_conn;
        server gateway-1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server gateway-2:8080 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 64;   # 保持与网关的常连接池
    }

    # ============================================
    # 主服务
    # ============================================
    server {
        listen 80;
        server_name localhost;

        # 并发连接限制
        limit_conn conn_limit 50;
        limit_req zone=general_limit burst=200 nodelay;

        # ==========================================
        # 代理头设置（全局）
        # ==========================================
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ==========================================
        # 路由：热搜榜单（缓存 1 秒，限流提升）
        # ==========================================
        location /api/trending {
            # 读接口放宽限流
            limit_req zone=general_limit burst=500 nodelay;

            proxy_pass http://gateway_cluster;

            # HTTP 缓存（与 Caffeine 组成 L0/L1/L2 三级缓存）
            proxy_cache trending_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 1s;          # 200 响应缓存 1 秒
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;               # 合并并发请求为单次回源
            proxy_cache_lock_timeout 3s;

            # 缓存状态头（调试用）
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ==========================================
        # 路由：AI 流式续写（SSE 长连接，禁用缓冲）
        # ==========================================
        location /api/ai/ {
            proxy_pass http://gateway_cluster;

            # SSE 必须禁用代理缓冲
            proxy_buffering off;
            proxy_cache off;

            # 长连接超时
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # 禁用响应压缩（流式数据逐块推送）
            gzip off;

            # 限流：写接口 + 单 IP
            limit_req zone=write_limit burst=10 nodelay;
        }

        # ==========================================
        # 路由：用户注册/登录（写接口限流）
        # ==========================================
        location /api/user/register {
            limit_req zone=write_limit burst=5 nodelay;
            proxy_pass http://gateway_cluster;
        }

        location /api/user/login {
            limit_req zone=write_limit burst=10 nodelay;
            proxy_pass http://gateway_cluster;
        }

        # ==========================================
        # 路由：文章写操作（创建/发布/修改/删除）
        # ==========================================
        location ~ ^/api/articles/(publish|like) {
            limit_req zone=write_limit burst=10 nodelay;
            proxy_pass http://gateway_cluster;
        }

        # ==========================================
        # 路由：通用 — 所有其他 API
        # ==========================================
        location /api/ {
            proxy_pass http://gateway_cluster;
            proxy_read_timeout 60s;
        }

        # ==========================================
        # 路由：健康检查
        # ==========================================
        location /actuator/health {
            proxy_pass http://gateway_cluster;
            access_log off;     # 健康检查不记录日志
        }

        # ==========================================
        # 路由：Nacos 控制台（开发用）
        # ==========================================
        location /nacos/ {
            proxy_pass http://nacos:8848/nacos/;
        }
        # ==========================================
        # 路由：前端 SPA 静态文件
        # ==========================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            # SPA fallback: 未知路径全部返回 index.html
            try_files $uri $uri/ /index.html;

            # 静态资源缓存
            location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
